<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jett.game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      #app {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
      }
      #app canvas {
        display: block;
        margin: 0 auto;
      }

      /* Mines HTML UI Overlays — Match Lobby Button Style */
      .mines-ui-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none; /* Allow clicks to pass through to canvas where needed */
      }

      .mines-title {
        font-family: Arial, sans-serif;
        font-size: 24px;
        font-weight: bold;
        color: #c9a84c;
        text-align: center;
        letter-spacing: 1px;
        pointer-events: auto;
      }

      .mines-prompt {
        font-family: Arial, sans-serif;
        font-size: 14px;
        color: #999999;
        text-align: center;
        letter-spacing: 0.5px;
        pointer-events: auto;
      }

      .mines-button {
        font-family: Arial, sans-serif;
        font-size: 18px;
        font-weight: bold;
        color: #c9a84c;
        background-color: rgba(0, 0, 0, 0.7);
        border: 2px solid #c9a84c;
        border-radius: 4px;
        padding: 8px 16px;
        cursor: pointer;
        transition: all 0.2s ease;
        letter-spacing: 0.5px;
        pointer-events: auto;
      }

      .mines-button:hover {
        background-color: rgba(201, 168, 76, 0.15);
      }

      .mines-button:active {
        background-color: rgba(201, 168, 76, 0.25);
      }

      .mines-button.selected {
        background-color: rgba(201, 168, 76, 0.3);
        box-shadow: 0 0 8px rgba(201, 168, 76, 0.5);
      }

      .mines-label {
        font-family: Arial, sans-serif;
        font-size: 13px;
        color: #c9a84c;
        letter-spacing: 0.5px;
        pointer-events: auto;
      }

      .mines-multiplier-label {
        font-family: Arial, sans-serif;
        font-size: 12px;
        color: #999999;
        text-align: center;
        letter-spacing: 0.5px;
        pointer-events: auto;
      }

      .mines-multiplier-value {
        font-family: Arial, sans-serif;
        font-size: 32px;
        font-weight: bold;
        color: #c9a84c;
        text-align: center;
        letter-spacing: 1px;
        pointer-events: auto;
      }

      .mines-status {
        font-family: Arial, sans-serif;
        font-size: 18px;
        color: #ffffff;
        text-align: center;
        letter-spacing: 0.5px;
        pointer-events: auto;
      }

      .mines-primary-button {
        font-family: Arial, sans-serif;
        font-size: 16px;
        font-weight: bold;
        color: #000000;
        background-color: #c9a84c;
        border: none;
        border-radius: 4px;
        padding: 12px 24px;
        cursor: pointer;
        transition: all 0.2s ease;
        letter-spacing: 0.5px;
        pointer-events: auto;
      }

      .mines-primary-button:hover {
        background-color: #d9b85c;
      }

      .mines-primary-button:active {
        background-color: #b9984c;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
