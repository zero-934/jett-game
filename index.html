<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jett.game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        /* Sharp text rendering */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #app {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
      }
      #app canvas {
        display: block;
        margin: 0 auto;
        /* Sharpen canvas rendering */
        image-rendering: crisp-edges;
        image-rendering: pixelated;
      }

      /* Mines HTML UI Overlays — Professional Game Style */
      .mines-title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 36px;
        font-weight: 800;
        color: #c9a84c;
        text-align: center;
        letter-spacing: 1px;
        pointer-events: auto;
        text-shadow: 0 2px 12px rgba(201, 168, 76, 0.4);
      }

      .mines-prompt {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: #aaaaaa;
        text-align: center;
        letter-spacing: 0px;
        pointer-events: auto;
      }

      .mines-button {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: #c9a84c;
        background-color: rgba(10, 10, 15, 0.9);
        border: 2.5px solid #c9a84c;
        border-radius: 16px;
        padding: 16px 28px;
        cursor: pointer;
        transition: all 0.15s ease;
        letter-spacing: 0px;
        pointer-events: auto;
        display: inline-block;
        box-shadow: 0 0 12px rgba(201, 168, 76, 0.3);
      }

      .mines-button:hover {
        background-color: rgba(201, 168, 76, 0.1);
        box-shadow: 0 0 20px rgba(201, 168, 76, 0.5);
        transform: translateY(-2px);
      }

      .mines-button.selected {
        background-color: rgba(201, 168, 76, 0.2);
        box-shadow: 0 0 28px rgba(201, 168, 76, 0.6);
        color: #ffffff;
        border-color: #ffffff;
      }

      .mines-label {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: #c9a84c;
        letter-spacing: 0px;
        pointer-events: auto;
      }

      .mines-multiplier-label {
        display: none; /* Hide label */
      }

      .mines-multiplier-value {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 72px;
        font-weight: 900;
        color: #c9a84c;
        text-align: center;
        letter-spacing: -2px;
        pointer-events: auto;
        text-shadow: 0 4px 20px rgba(201, 168, 76, 0.6), 0 0 20px rgba(201, 168, 76, 0.3);
        background: radial-gradient(circle at 30% 30%, rgba(201, 168, 76, 0.25), rgba(201, 168, 76, 0.08));
        border: 2px solid #c9a84c;
        border-radius: 50%;
        width: 160px;
        height: 160px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 24px rgba(201, 168, 76, 0.4), inset 0 0 12px rgba(201, 168, 76, 0.1);
      }

      .mines-status {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: #ffffff;
        text-align: center;
        letter-spacing: 0px;
        pointer-events: auto;
      }

      .mines-primary-button {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 18px;
        font-weight: 800;
        color: #000000;
        background: linear-gradient(135deg, #d9b860 0%, #c9a84c 100%);
        border: 2px solid #e0c870;
        border-radius: 16px;
        padding: 16px 48px;
        cursor: pointer;
        transition: all 0.2s ease;
        letter-spacing: 1px;
        pointer-events: auto;
        display: inline-block;
        box-shadow: 0 6px 20px rgba(201, 168, 76, 0.4);
      }

      .mines-primary-button:hover {
        background: linear-gradient(135deg, #e0c870 0%, #d9b860 100%);
        box-shadow: 0 8px 28px rgba(201, 168, 76, 0.5);
        transform: translateY(-3px);
      }

      .mines-primary-button:active {
        background: linear-gradient(135deg, #b99850 0%, #a98840 100%);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
      }

      .mines-primary-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
