<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>jett.game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }
      #app {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
      }
      #app canvas {
        display: block;
        margin: 0 auto;
      }

      /* Mines HTML UI Overlays — Professional Game Style */
      .mines-title {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 36px;
        font-weight: 800;
        color: #c9a84c;
        text-align: center;
        letter-spacing: 1px;
        pointer-events: auto;
        text-shadow: 0 2px 12px rgba(201, 168, 76, 0.4);
      }

      .mines-prompt {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 14px;
        font-weight: 500;
        color: #aaaaaa;
        text-align: center;
        letter-spacing: 0px;
        pointer-events: auto;
      }

      .mines-button {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 18px;
        font-weight: 700;
        color: #c9a84c;
        background-color: rgba(0, 0, 0, 0.6);
        border: 2.5px solid #c9a84c;
        border-radius: 16px;
        padding: 14px 28px;
        cursor: pointer;
        transition: all 0.15s ease;
        letter-spacing: 0px;
        pointer-events: auto;
        display: inline-block;
        box-shadow: 0 0 12px rgba(201, 168, 76, 0.3);
      }

      .mines-button:hover {
        background-color: rgba(201, 168, 76, 0.2);
        box-shadow: 0 0 20px rgba(201, 168, 76, 0.5);
        transform: translateY(-2px);
      }

      .mines-button.selected {
        background-color: rgba(201, 168, 76, 0.3);
        box-shadow: 0 0 24px rgba(201, 168, 76, 0.6);
        color: #ffffff;
      }

      .mines-label {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 13px;
        font-weight: 600;
        color: #c9a84c;
        letter-spacing: 0px;
        pointer-events: auto;
      }

      .mines-multiplier-label {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: #888888;
        text-align: center;
        letter-spacing: 0px;
        pointer-events: auto;
      }

      .mines-multiplier-value {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 40px;
        font-weight: 700;
        color: #c9a84c;
        text-align: center;
        letter-spacing: 0px;
        pointer-events: auto;
        text-shadow: 0 2px 8px rgba(201, 168, 76, 0.3);
      }

      .mines-status {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 18px;
        font-weight: 600;
        color: #ffffff;
        text-align: center;
        letter-spacing: 0px;
        pointer-events: auto;
      }

      .mines-primary-button {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 16px;
        font-weight: 700;
        color: #000000;
        background-color: #c9a84c;
        border: none;
        border-radius: 12px;
        padding: 14px 32px;
        cursor: pointer;
        transition: all 0.15s ease;
        letter-spacing: 0px;
        pointer-events: auto;
        display: inline-block;
        box-shadow: 0 4px 12px rgba(201, 168, 76, 0.3);
      }

      .mines-primary-button:hover {
        background-color: #dab860;
        box-shadow: 0 6px 16px rgba(201, 168, 76, 0.4);
        transform: translateY(-2px);
      }

      .mines-primary-button:active {
        background-color: #b99850;
        transform: translateY(0);
      }

      .mines-primary-button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
